<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">ChatOpsLLM architecture</title>
  <desc id="desc">CI/CD, Kubernetes model serving, data ingestion, logging, monitoring, and external LLM providers.</desc>
  <defs>
    <style>
      .bg{fill:#fbfbf8}.zone{fill:#fff;stroke:#222;stroke-width:1.2}.box{fill:#fff;stroke:#222;stroke-width:1}.soft{fill:#f7fafc;stroke:#222;stroke-width:1}.yellow{fill:#fff1a8}.green{fill:#b9f2c1}.blue{fill:#a9d8ff}.pink{fill:#ffc3c3}.label{font:600 17px Arial,sans-serif;fill:#111}.small{font:13px Arial,sans-serif;fill:#222}.tiny{font:11px Arial,sans-serif;fill:#333}.title{font:700 30px Arial,sans-serif;fill:#d93025}.arrow{stroke:#222;stroke-width:1.4;fill:none;marker-end:url(#arrow)}.dash{stroke:#444;stroke-width:1.1;stroke-dasharray:5 5;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#222"/>
    </marker>
  </defs>
